data:
  symbol: SPY
  interval: 5m
  period: 60d
  timezone: America/New_York
  session_start: "09:30"
  session_end: "16:00"

strategy:
  name: bollinger_rsi_reversal
  params:
    bb_length: 20
    bb_std: 2.0
    rsi_length: 14
    atr_length: 14
    rsi_oversold: 35
    rsi_overbought: 65
    volume_ma_length: 20
    min_rel_volume: 1.2
    min_volume_sma: 1000000

risk:
  capital_per_trade: 1000
  option_target_pct: 0.05
  hold_bars: 3
  option_leverage: 20.0
  stop_atr_mult: 1.0
  commission_per_trade: 1.0

options:
  # synthetic | yahoo | polygon | alpaca | marketdata
  provider: polygon
  dte_target_days: 2
  otm_steps: 1
  use_real_prices_for_pnl: true
  require_real_prices: true
  provider_params:
    api_key: ""
    base_url: "https://api.massive.com"
    timeout_sec: 20
    max_retries: 5
    backoff_sec: 0.8
    max_pages: 3
